<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HW 7: To-Do List App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="page-header">
    <h1>Task Hub</h1>
  </header>

  <main class="app-layout">
    <section class="panel" aria-labelledby="create-list-heading">
      <h2 id="create-list-heading">Create a New List</h2>
      <div class="input-row">
        <input
          type="text"
          id="newListName"
          placeholder="Enter a new list name"
          aria-label="New list name"
        >
        <button id="addListBtn">Add List</button>
      </div>
    </section>

    <section class="panel" aria-labelledby="lists-heading">
      <h2 id="lists-heading">Your Lists</h2>
      <ul id="lists"></ul>
    </section>

    <section class="panel" aria-labelledby="currentListName">
      <h2 id="currentListName">Select a List</h2>
      <div class="input-row">
        <input
          type="text"
          id="newItemText"
          placeholder="Enter a new task"
          aria-label="New task text"
        >
        <button id="addItemBtn">Add Task</button>
      </div>
      <ul id="items"></ul>
    </section>
  </main>

  <footer>
    &copy; 2026 Group 2 Bryan L and Paul U.
  </footer>

  <script src="js/app.js"></script>
  
</body>
</html>
